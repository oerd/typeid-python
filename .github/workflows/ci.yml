name: CI

on: [pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: "Install uv"
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.9.10"

      - name: "Set up Python"
        run: uv python install

      - name: "Install the project and dependencies"
        run: uv sync --locked --all-extras --dev

      - name: "Run linters"
        run: |
          uv run ruff check --select I typeid/ tests/
          uv run ruff format --check typeid/ tests/
          uv run mypy typeid/ --pretty

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.9.10"

      - name: Set up Python
        run: uv python install

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Run tests
        run: uv run pytest -v
